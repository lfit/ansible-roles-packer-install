---
- name: Prepare
  hosts: all
  gather_facts: true
  tasks:
    - name: Update APT cache
      apt:
        update_cache: yes
      when: ansible_facts['distribution'] == 'Ubuntu'
      become: true

    - name: Install curl and CA certs on Ubuntu
      apt:
        name:
          - curl
          - ca-certificates
        state: present
      when: ansible_facts['distribution'] == 'Ubuntu'
      become: true

    - name: Install curl and CA certs on RedHat
      yum:
        name:
          - curl
          - ca-certificates
        state: present
      when: ansible_facts['os_family'] == 'RedHat'
      become: true

    - name: Install unzip
      package:
        name: unzip
        state: present
